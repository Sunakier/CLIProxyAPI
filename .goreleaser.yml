version: 2

builds:
  - id: "cli-proxy-api"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/server/
    binary: cli-proxy-api
    ldflags:
      - -s -w -X 'main.Version={{.Version}}' -X 'main.Commit={{.ShortCommit}}' -X 'main.BuildDate={{.Date}}'
archives:
  - id: "cli-proxy-api"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - README_CN.md
      - config.example.yaml

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

dockers:
  - id: cli-proxy-api-amd64
    ids:
      - cli-proxy-api
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/sunakier/cli-proxy-api:{{ .Tag }}-amd64"
      - "ghcr.io/sunakier/cli-proxy-api:latest-amd64"
    extra_files:
      - config.example.yaml
    skip_push: auto

  - id: cli-proxy-api-arm64
    ids:
      - cli-proxy-api
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/sunakier/cli-proxy-api:{{ .Tag }}-arm64"
      - "ghcr.io/sunakier/cli-proxy-api:latest-arm64"
    extra_files:
      - config.example.yaml
    skip_push: auto

docker_manifests:
  - name_template: "ghcr.io/sunakier/cli-proxy-api:{{ .Tag }}"
    image_templates:
      - "ghcr.io/sunakier/cli-proxy-api:{{ .Tag }}-amd64"
      - "ghcr.io/sunakier/cli-proxy-api:{{ .Tag }}-arm64"
    skip_push: auto

  - name_template: "ghcr.io/sunakier/cli-proxy-api:latest"
    image_templates:
      - "ghcr.io/sunakier/cli-proxy-api:latest-amd64"
      - "ghcr.io/sunakier/cli-proxy-api:latest-arm64"
    skip_push: auto
